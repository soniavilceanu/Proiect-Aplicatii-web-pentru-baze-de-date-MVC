<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Save new Book</title>
    <link rel="stylesheet" href="/webjars/bootstrap/4.5.0/css/bootstrap.min.css"/>
    <script src="/webjars/bootstrap/4.5.0/js/bootstrap.min.js"></script>
<body>
<form th:object="${book}" th:action="@{/book/}" method="post" enctype="multipart/form-data">
    <input type="hidden" th:field="*{bookId}"/>
    <div class="container">
        <div class="panel panel-primary">
            <div class="panel-heading" style="background-color:lightgray;">
                <h1 class="panel-title">Book INFO</h1>
            </div>
            <div class="panel-body">
                <div class="row">
                    <div class="col-md-3 form-group">
                        <label>Book name:</label>
                        <input type="text" class="form-control" th:field="*{bookName}"/>
                    </div>
                    <div class="col-md-3 form-group">
                        <label>Author:</label>
                        <input type="text" class="form-control" th:field="*{author.authorId}"/>
                    </div>
                    <div class="col-md-3 form-group">
                        <label>Publisher:</label>
                        <input type="text" class="form-control" th:field="*{publisher.publisherId}"/>
                    </div>
                    <div class="col-md-3 form-group">
                        <label>Book Details:</label>
                        <input type="text" class="form-control" th:field="*{bookDetails.bookDetailsId}"/>
                    </div>
                </div>



                <div class="row">



                </div>


                <div class="row">
                    <div class="col-md-7 ml-md-auto">
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</form>
</body>
</html>
