<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Info</title>
    <link rel="stylesheet" href="/webjars/bootstrap/4.5.0/css/bootstrap.min.css"/>
    <script src="/webjars/bootstrap/4.5.0/js/bootstrap.min.js"></script>
<body>
<div class="container" style="margin-top: 50px">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <div class="pannel-group">
                <div class="panel panel-primary">
                    <div class="panel-heading" style="background-color:lightgray;">
                        <h1 class="panel-title" th:text="${book.bookName}">Book</h1>
                    </div>
                    <div class="panel-body">


                        <div class="row">
                            <div class="col-md-2">
                                <p>Publisher Name:</p>
                            </div>

                            <div class="col-md-3">
                                <p th:text="${book.publisher.publisherName != null ?(book.publisher.publisherName):'code'}">Publisher</p>
                            </div>



                        </div>
                    </div>
                </div>

            </div>
            <div class="panel panel-primary">
                <div class="panel-heading" style="background-color:lightgray;">
                    <h1 class="panel-title">Extra information</h1>
                </div>
                <div class="panel-body">
                    <div class="row">

                        <div class="col-md-12">

                            <p th:text="'Short description:   ' + ${book.bookDetails.description != null ? book.bookDetails.description:''}">
                                Description
                            </p>

                        </div>


                    </div>
                    <div class="row">

                        <div class="col-md-12">


                            <p th:text="'Nr. of Pages:   ' + ${book.bookDetails.noOfPages != null ? book.bookDetails.noOfPages:''}">
                                noOfPages
                            </p>
                        </div>


                    </div>
                    <div class="row">

                        <div class="col-md-12">


                            <p th:text="'Price:   ' + ${book.bookDetails.price != null ? book.bookDetails.price:''}">
                                Price
                            </p>
                        </div>


                    </div>

                    <div class="col-md-6">
                        <a class="btn btn-primary" role="button" th:href="@{'/book/update/' + ${book.bookId}}">update book</a>
                    </div>


                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
