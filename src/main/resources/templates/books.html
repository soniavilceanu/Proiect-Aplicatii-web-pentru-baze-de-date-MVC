<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books</title>
    <link rel="stylesheet" href="/webjars/bootstrap/4.5.0/css/bootstrap.min.css" />
    <script src="/webjars/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>

Logged user: <span sec:authentication="name">user</span> Roles: <span sec:authentication="principal.authorities">[ROLE_USER]</span>

<div class="container">
    <table class="table table-hover ">
        <thead class="thead-inverse">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>BookDetails</th>
            <th>Delete</th>
        </tr>
        </thead>
        <tr th:each="book, stat : ${books}"
            th:class="${stat.odd}? 'table-light':'table-dark'"
        >
            <td th:text="${book.bookId}">1</td>
            <td th:text="${book.bookName}">Book 1</td>
            <td><a href="#" th:href="@{'/book/info/' + ${book.bookId}}">Info</a></td>
            <td><a href="#" th:href="@{'/book/delete/' + ${book.bookId}}">Delete</a></td>
        </tr>
    </table>
</div>
<div class="container">
    <div class="row">
        <div class="col-md-6">
            <a class="btn btn-primary" role="button" th:href="@{'/book/new'}">add book</a>
        </div>

    </div>
</div>

<div class="col-md-3">
    <form th:action="@{/logout}" method="POST">
        <input type="submit" class="btn btn-primary" value="Logout">
    </form>
</div>


</body>
</html>
